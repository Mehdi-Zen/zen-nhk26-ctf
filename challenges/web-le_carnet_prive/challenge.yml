name: " Le carnet perdu de Ocean Ramsey et Juan Oliphant"
author: "Malth"
category: Web

description_image: files/challenge.jpeg

description: |
  Ocean Ramsey et Juan Oliphant sont deux zoologiste qui ont participé à des travaux de recherches sur le lien entre le comportement des grands requins blanc et le réchauffement climatique.
  Un serveur web montre des extraits de carnets personnels pour les exposer lors d’un colloque mais certains carnets sont marqués « privé ».
  Vous devez retrouver le carnet privé de Ocean & Juan.

