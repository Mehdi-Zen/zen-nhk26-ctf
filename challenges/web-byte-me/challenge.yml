description: |
  Jon Ellman a consacré sa carrière à la chimie des C-H et à la synthèse combinatoire.
  Ses travaux sont cités partout , mais ses archives internes, elles, sont censées rester privées.

  L'Institut Ellman vient de mettre en ligne un portail d'archives publiques.
  Le catalogue propose plusieurs rapports en téléchargement au format PDF.

  Une rumeur circule : un dossier interne (#67) aurait été laissé sur le serveur par erreur.
  L'équipe assure que seuls les PDF sont accessibles.

  Prouve le contraire.

