description: |
  Laure Grandbesançon, journaliste scientifique, préparait une émission sur une figure majeure de la paléontologie.

  Le projet a été abandonné et ses notes ont disparu. Seuls quelques fragments subsistent dans un document pdf.

  Votre mission : reconstituer les éléments manquants et retrouver l’information recherchée.

