name: "Einstein’s XOR"
author: "Bruce"
category: Crypto                   # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png

description: |
  Plusieurs messages chiffrés ont été interceptés lors d’une communication suspecte.

  À première vue, les données semblent totalement aléatoires.
  Cependant, une analyse attentive pourrait révéler une faiblesse dans la manière dont le chiffrement a été utilisé.

value: 500
type: dynamic
state : hidden  

extra:
