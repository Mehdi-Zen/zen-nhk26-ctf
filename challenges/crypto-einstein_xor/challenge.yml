  decay: 6                      # facteur de decroissance
  minimum: 300                  # Minimum

tags:
  - DIFFICILE
  - CRYPTO

flags:
  - flag: "NHK26{einstein_xor}"
    type: static
    
files:
  - files/einstein_1.bin
  - files/einstein_2.bin
  - files/einstein_3.bin
