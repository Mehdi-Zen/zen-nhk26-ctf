description: |

  Vous êtes chargé d’analyser un document mystérieux retrouvé dans les archives d’un laboratoire de renom dirigé par des scientifiques visionnaires comme Blaise de Vigenere, avait pour habitude de dissimuler ses informations sensibles derrière des méthodes de communication chiffrées et sophistiquées.

  Ce laboratoire, dirigé par des scientifiques renommés, avait pour habitude de dissimuler ses informations sensibles derrière des méthodes de communication anciennes.

  Un fichier texte nommé document.txt vous est transmis. Son contenu ne ressemble à aucun langage moderne, mais il pourrait s’agir d’un système de communication historique, autrefois utilisé par les scientifiques pour transmettre des données de manière discrète. Le laboratoire compte sur vous pour décoder le contenu de ce fichier ! 


