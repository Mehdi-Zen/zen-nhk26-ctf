name: "Turing’s Gate"
author: "Bruce"
category: Reverse                    # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png

description: |
  Un petit exécutable demande un mot de passe.
  Le mot de passe correct est présent en clair dans le binaire.

  L'objectif est de retrouver la chaîne la plus simplement possible et la soumettre comme flag.

value: 50
type: dynamic
state : visible  

