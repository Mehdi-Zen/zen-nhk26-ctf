name: "Patch de Shannon"
author: "Valou"
category: Code Review                 # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png    # OBLIGATOIRE

description: |

  En naviguant sur le web, vous tombez sur un code partagé sur un forum technique par un utilisateur du nom de Claude_Shannon. 

  D’après son auteur, ce programme est censé afficher un message, mais actuellement le résultat généré n'est pas ce qui est prévu.
  
  Votre but est le suivant : modifier le code afin de trouver le flag.

