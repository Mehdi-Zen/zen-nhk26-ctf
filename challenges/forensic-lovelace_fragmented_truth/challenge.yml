name: "Lovelace Fragmented Truth"
author: "Bruce"
category: Forensic                   # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png

description: |
  Une capture réseau issue d’un poste suspect montre un trafic HTTP apparemment banal entre deux hôtes.

  Pourtant, en y regardant de plus près, certains échanges semblent transporter des données inhabituelles.

  - Analyser le trafic,

  - Identifier les éléments pertinents,

  - Reconstituer ce qui a réellement été transmis,

  - Retrouver le message final.

  Le fichier fourni contient tout ce dont vous avez besoin.

