name: "GIF des idées de génie"
author: "Twistyle"
category: Forensic                 # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png    # OBLIGATOIRE

description: |
  Un employé affirme qu’il n’a “absolument rien caché” dans ce GIF.  
  Techniquement, il a raison. Enfin… peut-être.

  Le fichier semble parfaitement normal.  
  Aucun pixel suspect. Aucun glitch étrange.  
  Bref, un GIF comme on en voit mille par jour.

  Mais selon son créateur, il serait inspiré des travaux de Erwin Schrödinger.

  Donc soit il n’y a rien dedans…  
  soit il y a quelque chose…  
  soit les deux à la fois.

  À vous d’ouvrir la boîte. 🐱

