    - "Ghost Protocol - Partie 2"
author: "Wumbou"
category: Forensic                   # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png   # OBLIGATOIRE pour l'affichage dans la description

description: |
  Après avoir identifié le contrat malveillant, les analystes soupçonnent qu’il n’a pas servi uniquement à déplacer des fonds : il aurait aussi été utilisé comme canal de communication.  
  Une dead drop a été dissimulée dans les traces on-chain du contrat, noyée dans le bruit.

  Un laptop saisi a également révélé un message chiffré lié à ce rendez-vous. Les artefacts fournis contiennent tout le nécessaire pour retrouver la référence, puis déverrouiller et déchiffrer le message à partir des éléments reconstitués.

  Vous n’avez aucun accès à Internet : tout ce dont vous avez besoin est dans les fichiers fournis.


