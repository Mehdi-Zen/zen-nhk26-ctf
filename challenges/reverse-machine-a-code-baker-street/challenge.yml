description: |
  Un ancien programme retrouvé dans les archives d’Alan **TURING** semble cacher un message secret. Le binaire accepte une entrée utilisateur puis affiche une réponse personnalisée. Cependant, quelque chose semble inhabituel dans sa gestion mémoire. Le message secret n’est pas affiché directement. Il est chiffré à l’aide d’une clé répétée, dont le nom est mis en évidence dans cet énoncé. 

