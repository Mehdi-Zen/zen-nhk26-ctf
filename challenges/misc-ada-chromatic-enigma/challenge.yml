name: "Ada's Chromatic Enigma"
author: "Mathias"
category: Misc                 # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png    # OBLIGATOIRE

description: |
  Londres, 1843. Ada Lovelace vient de publier ses Notes sur la Machine Analytique de Babbage. Dans la Note G figure le premier programme informatique de l'histoire : le calcul des nombres de Bernoulli.
  Un robot EV3 attend sur une grille 7×7, immobile. Pour le faire avancer, il faut lui envoyer une séquence de mouvements , chiffrée avec un algorithme inspiré de la Note G, signée avec une clef secrète. Ces deux secrets dorment quelque part dans la base de données…*   
  connectez-vous à l'adresse suivante **[Ada's Chromatic Enigma](https://192.168.213.6)**

# Points: voir document de Camille
