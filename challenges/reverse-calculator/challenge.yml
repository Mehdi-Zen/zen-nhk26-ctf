name: "Einstein’s Relativity Calculator"
author: "Twistyle"
category: Reverse                    # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png   # OBLIGATOIRE pour l'affichage dans la description

description: |
  On vous remet un programme en C qui reste énigmatique. Décrit comme un calculateur de
  relativité, il se vante d’évaluer l’énergie d’un objet en fonction d’une valeur fournie par
  l’utilisateur, en se basant sur une constante interne censée correspondre à la vitesse de la
  lumière.
  
  Toutefois, il y a quelque chose qui ne va pas.

  Le paramètre employé ne correspond à aucune valeur physique identifiable : il est déformé,
  fragmenté et intentionnellement obscurci. Sous ce vernis de calcul scientifique se dissimule un
  mystère bien plus captivant : une communication codée dissimulée au sein du binaire.

  Pensez à faire : `chmod +x relativity`

