description: |
  Vous êtes dans un laboratoire futuriste du MIT, aux côtés de Cynthia Breazeal
  (robots sociaux empathiques comme **Kismet** et **Jibo**).
  Un assistant a laissé traîner un fichier objet **robot_control_module.o** censé contrôler un robot amical...
  mais il contient un secret : un **flag caché**.

