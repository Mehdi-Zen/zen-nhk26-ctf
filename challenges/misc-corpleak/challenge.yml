description_image: files/challenge.gif   # OBLIGATOIRE pour l'affichage dans la description

description: |

  Une entreprise a été compromise de l'intérieur.

  Un employé a exfiltré des données sensibles via l'infrastructure réseau sans fil de la société. 
  Une borne WiFi émet dans les environs de la salle.
  Les réseaux de l'entreprise suivent tous la convention de nommage `"Corp-""`.

  À toi de retrouver ce qui a été caché avant qu'il ne soit trop tard.

