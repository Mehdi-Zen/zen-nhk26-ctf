description: |
  Le professeur Maxime Lehmann a voulu chiffrer son travail axés sur la pharmacologie et la biologie cellulaire appliqué au cancer du cerveau. Un influant lobby pharmaceutique souhaite subtiliser ses travaux afin de les exploiter de façon lucrative.
  Pour se faire il a entendu l'existence d'un algorithme de cryptage plutôt répandu, AES.
  Mais il n'a pas eu le temps de se renseigner sur les méthodes différentes que peut employer cet algorithme afin de fonctionner.
  Vous devez réussir a extraire la formule chimique caché dans ses travaux.
  Celle-ci aura la forme NHK26{...}.

value: 500                       # Voir document de Camille
