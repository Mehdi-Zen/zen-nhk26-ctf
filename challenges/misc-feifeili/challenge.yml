description: |
  Vous travaillez sur un projet de vision par ordinateur inspiré des travaux de **Fei-Fei Li**,
  pionnière dans l’analyse d’images et la reconnaissance visuelle à grande échelle.

  Une image issue d’un ancien jeu de données vous a été transmise.
  À première vue, elle semble parfaitement normale…
  Pourtant une information y a été dissimulée.

