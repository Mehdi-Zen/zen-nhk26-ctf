description: |
  Intitulé « Annonce la couleur », ce challenge fait référence au domaine de la trichromie, un procédé permettant de générer une large gamme de couleurs à partir de trois couleurs primaires : rouge, vert et bleu. Les premières expériences dans ce domaine ont été menées par le physicien James Clerk Maxwell.

  À partir de l’applicatif fourni, vous devrez analyser son fonctionnement pour retrouver la suite de valeurs RGB qui permettra d’obtenir le flag. Observez attentivement le programme afin de retrouver les trois couleurs permettant d'obtenir le flag !

