server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Servir les fichiers statiques DIRECTEMENT
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        access_log off;
        expires 7d;
    }

    # Toutes les routes passent par le front-controller
    location / {
        try_files $uri /index.php?$query_string;
    }

    # Seul index.php a le droit d'être exécuté
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bloquer TOUT le reste des PHP
    location ~ \.php$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}

