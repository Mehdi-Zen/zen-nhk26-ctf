name: "Discord Leak"
author: "EnderMan"
category: Forensic

description_image: files/challenge.png

description: |
  George Koval. Chimiste. Prix Lénine. Et espion soviétique infiltré au cœur du Projet Manhattan pendant des années sans jamais être démasqué de son vivant.

  Il n'a pas eu besoin de hacker quoi que ce soit, il était **de l'intérieur**.

  En 2024, l'histoire se répète dans les couloirs de **SecureCorp**. L'équipe de sécurité a reçu une alerte : un employé aurait utilisé Discord pour exfiltrer des documents confidentiels vers un contact extérieur.

  Le poste a été saisi. Les données sont là, mais certains messages ont été supprimés et un fichier est corrompu.

  À vous de reconstituer les preuves avant que la piste ne disparaisse.

  *"The best spy is the one you never suspect."*

