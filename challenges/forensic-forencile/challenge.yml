name: "Forencile"
author: "ErEn"
category: Forensic

description_image: files/challenge.jpg

description: |
  "Tout contact laisse une trace" — Principe d'Edmond Locard

  Une clé USB mystérieuse a été retrouvée. L'équipe soupçonne que des informations ont été dissimulées dans les fichiers. Une image semble anodine, mais selon le principe de Locard, toute interaction avec un fichier laisse des traces...

  Votre mission : analyser l'image et extraire la preuve cachée.

