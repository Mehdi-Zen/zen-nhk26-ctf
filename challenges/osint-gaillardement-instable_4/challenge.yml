description: |
  Nous y sommes.

  Après des semaines d’investigation, de recoupements et de fausses pistes,
  il ne reste plus qu’un seul mystère à résoudre.

  Le  /05/2024, à une heure précise,
  Michel Gaillard a levé les yeux vers le ciel.
  Une photographie a été prise.

  Aucun bâtiment.
  Aucun panneau.
  Aucun repère évident.

  Seulement les étoiles.

  Mais le ciel ne ment jamais.

  À partir de cette image, vous devez déterminer
  la position exacte depuis laquelle la photo a été capturée.

  Latitude. Longitude.
  Pas une approximation.
  Une certitude.

  Les étoiles savent.
  À vous de les lire.

  Format du flag :
  NHK26{xxxxx_xxxxx}

