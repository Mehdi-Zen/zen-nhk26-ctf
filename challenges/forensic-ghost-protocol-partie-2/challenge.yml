name: "Ghost Protocol - Partie 2"
author: "Wumbou"
category: Forensic                   # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png   # OBLIGATOIRE pour l'affichage dans la description

description: |
  Une fois la phase de financement identifiée, l’attaque ne s’est pas faite de main en main en clair.  
  Un composant dans la chaine de transaction a servi de pivot pour orchestrer les actions suivantes : interactions, mouvements de fonds, et opérations multi-chaînes.

  Vous n’avez aucun accès à Internet : tout ce dont vous avez besoin est dans les fichiers fournis.

  Soumettre le flag correspondant à l’adresse du contrat malveillant impliqué dans l’opération. Attention : Veuillez etre sur avant de soumettre le flag, il se peut que ce n'a soit pas ce que vous pensez....
  
  `Format :NHK26{0x...}`


value: 1                       # Voir document de Camille
