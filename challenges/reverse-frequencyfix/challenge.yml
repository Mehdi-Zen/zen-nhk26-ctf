name: "Frequency Fix"
author: "Kln"
category: Reverse                  # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png   # OBLIGATOIRE pour l'affichage dans la description

description: |
  Un émetteur radio utilisant la technologie de saut de fréquence d'Hedy Lamarr présente des dysfonctionnements. L'émetteur saute constamment entre différentes fréquences, empêchant la transmission du message secret.
  Vous devez donc analyser le binaire, comprendre le mécanisme de génération des fréquences, et stabiliser l'émetteur pour révéler le flag.

