description: |
  Nous commençons ici un périple afin de retrouver la trace d'un ingénieur français nommé Michel Gaillard.
  Ce challenge sera en 4 étapes liée les unes des autres. Dans cette première étape, les service secret français on réussi a retrouvé le billet d'avion de Mr Gaillard. Un indice y est disséminé. le flag sera sous la forme NHK26{xxx_xx_xxxxxx}. Attention l'agent qui a créer cela a une passion pour mélanger les lettres et les chiffres.

