[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:mysql]
command=/usr/sbin/mysqld --user=mysql --bind-address=127.0.0.1 --socket=/var/run/mysqld/mysqld.sock --pid-file=/var/run/mysqld/mysqld.pid
autostart=true
autorestart=true
startsecs=3
stderr_logfile=/var/log/mysql.err.log
stdout_logfile=/var/log/mysql.out.log

[program:postgres]
; IMPORTANT on Ubuntu/Debian: config lives in /etc/postgresql/14/main/postgresql.conf
command=/usr/lib/postgresql/14/bin/postgres -D /var/lib/postgresql/14/main -c config_file=/etc/postgresql/14/main/postgresql.conf -c listen_addresses=127.0.0.1 -c logging_collector=off -c statement_timeout=0
user=postgres
autostart=true
autorestart=true
startsecs=3
stderr_logfile=/var/log/postgres.err.log
stdout_logfile=/var/log/postgres.out.log

[program:node]
directory=/opt/challenge/app
command=node server.js
autostart=true
autorestart=true
startsecs=2
stderr_logfile=/var/log/node.err.log
stdout_logfile=/var/log/node.out.log
environment=NODE_ENV="production"
