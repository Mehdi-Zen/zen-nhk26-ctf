name: "Sky of Packets"
author: "Twistyle"
category: Forensic                    # Web, Code Review, Crypto, Forensic, Reverse, OSINT, Misc

description_image: files/challenge.png   # OBLIGATOIRE pour l'affichage dans la description

description: |
  L’observatoire Galileo surveille le ciel… mais cette fois, la menace ne venait pas des étoiles.

  Une analyse de routine du trafic réseau a révélé une activité inhabituelle, subtilement dissimulée au cœur d’échanges parfaitement légitimes. Rien de flagrant, rien d’évident, seulement une intuition : quelque chose a quitté le réseau sans autorisation.

  Votre mission est simple en apparence : comprendre ce qui a été exfiltré.
  Mais ici, chaque paquet compte, et la vérité se cache dans les détails que l’on ne regarde jamais.

  Bonne chasse.

