name: "Mystère des Phéromones"
author: "Andy"
category: Crypto

description_image: files/challenge.png

description: |
  Inspiré des travaux d’Audrey Dussutour (CNRS) sur le comportement collectif des fourmis,
  ce challenge vous plonge dans un laboratoire étudiant la communication chimique des colonies.
  Un message secret a été fragmenté et protégé via un mécanisme simple (mais collectif).


value: 300
