hints:
  - content: "Commence par reconstituer le flux complet : concaténation dans le bon ordre, puis inspecte le résultat (hex/strings)."
    cost: 25
  - content: "Le déchiffrement repose sur une opération très simple et répétitive (pense à un masque/clé qui se répète)."
    cost: 60

max_attempts: 0
