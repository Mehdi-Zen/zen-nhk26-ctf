name: Build Challenge Images

on:
  push:
    branches: [main]
    paths:
      - 'challenges/**/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  find-challenges:
    runs-on: ubuntu-latest
    outputs:
      challenges: ${{ steps.find.outputs.challenges }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          CHALLENGES=$(find challenges -name Dockerfile -exec dirname {} \; | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "challenges=$CHALLENGES" >> "$GITHUB_OUTPUT"

  build:
    needs: find-challenges
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        challenge: ${{ fromJson(needs.find-challenges.outputs.challenges) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get challenge name
        id: meta
        run: |
          CHALLENGE_DIR="${{ matrix.challenge }}"
          NAME=$(basename "$CHALLENGE_DIR" | tr '[:upper:]' '[:lower:]')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.challenge }}
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/nhk26/${{ steps.meta.outputs.name }}:latest
