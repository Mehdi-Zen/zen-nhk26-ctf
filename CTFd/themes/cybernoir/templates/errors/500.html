{% extends "base.html" %}

{% block content %}
<div class="container min-vh-75 d-flex align-items-center justify-content-center">
  <div class="text-center">
    <div class="error-code" style="font-family: 'Orbitron', sans-serif; font-size: 8rem; font-weight: 700; color: #ff00ff; text-shadow: 0 0 30px rgba(255, 0, 255, 0.5), 0 0 60px rgba(255, 0, 255, 0.3); line-height: 1;">
      500
    </div>
    <h2 class="mt-3" style="font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: #00fff5;">
      {% trans %}Internal Server Error{% endtrans %}
    </h2>
    <p class="text-muted mt-3 mb-4" style="font-family: 'Share Tech Mono', monospace;">
      {{ error }}
    </p>

    <a href="{{ url_for('views.static_html', route='/') }}" class="btn btn-primary">
      <i class="fas fa-home me-2"></i>{% trans %}Return Home{% endtrans %}
    </a>
  </div>
</div>
{% endblock %}
