{% extends "base.html" %}

{% block content %}
  <div class="container min-vh-75 d-flex align-items-center justify-content-center">
    <div class="text-center">
      <div class="error-code" style="font-family: 'Orbitron', sans-serif; font-size: 8rem; font-weight: 900; color: #00fff5; text-shadow: 0 0 30px rgba(0, 255, 245, 0.5); line-height: 1;">
        404
      </div>
      <h2 class="mt-3" style="font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: #e0e0ff;">
        SIGNAL LOST
      </h2>
      <p class="text-muted mt-3 mb-4" style="font-family: 'Share Tech Mono', monospace;">
        {% trans %}The page you're looking for doesn't exist in this dimension.{% endtrans %}
      </p>

      <a href="{{ url_for('views.static_html') }}" class="btn btn-primary">
        <i class="fas fa-home me-2"></i>{% trans %}Return to Base{% endtrans %}
      </a>
    </div>
  </div>
{% endblock %}
